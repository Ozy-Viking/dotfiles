"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
command_timeout = 200
format = "[$username$hostname$localip$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[localip]
ssh_only = false
format = '[\[$localipv4\]](bold blue) '
disabled = false

[username]
style_user = 'green bold'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true
aliases = {  }

[hostname]
ssh_only = false
format = '@[$ssh_symbol](bold blue)[$hostname](bold red)'
trim_at = '.hankin.io'
disabled = false
